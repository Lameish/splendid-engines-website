<svg viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" font-family="'Big Shoulders Display', 'Hanley Pro', sans-serif">
  <title>Figure 02: AI productivity gain by experience level</title>
  <rect width="800" height="540" fill="#FFFFFF"/>
  <text x="400" y="35" text-anchor="middle" font-weight="800" font-size="12" letter-spacing="4" fill="#DB4937">FIG. 02</text>
  <text x="400" y="65" text-anchor="middle" font-weight="800" font-size="22" letter-spacing="3" fill="#153047">WHO GETS THE BIGGEST LIFT?</text>
  <text x="400" y="92" text-anchor="middle" font-family="Mulish, sans-serif" font-style="italic" font-size="13" fill="#153047">Productivity gain when generative AI shows up at work.</text>
  <line x1="160" y1="430" x2="640" y2="430" stroke="#153047" stroke-width="2.5" stroke-linecap="square"/>
  <rect x="230" y="320" width="120" height="110" fill="#FFFFFF" stroke="#153047" stroke-width="2.5" stroke-linejoin="miter"/>
  <text x="290" y="307" text-anchor="middle" font-weight="800" font-size="42" fill="#153047">14%</text>
  <text x="290" y="455" text-anchor="middle" font-weight="800" font-size="13" letter-spacing="2" fill="#153047">AVERAGE WORKER</text>
  <rect x="450" y="160" width="120" height="270" fill="#DB4937" stroke="#153047" stroke-width="2.5" stroke-linejoin="miter"/>
  <text x="510" y="147" text-anchor="middle" font-weight="800" font-size="42" fill="#153047">34%</text>
  <text x="510" y="455" text-anchor="middle" font-weight="800" font-size="13" letter-spacing="2" fill="#153047">LEAST-EXPERIENCED WORKER</text>
  <text x="510" y="477" text-anchor="middle" font-weight="800" font-size="13" letter-spacing="2" fill="#DB4937">(THE GENERALIST EQUIVALENT)</text>
  <text x="400" y="515" text-anchor="middle" font-family="Mulish, sans-serif" font-size="11" fill="#153047" opacity="0.7">Source: Brynjolfsson, Li, Raymond (2023), "Generative AI at Work," NBER 31161 (now QJE).</text>
</svg>